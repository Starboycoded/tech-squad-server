<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ vendor }} | Storefront</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f4f4f9; margin: 0; color: #333; }
        header { background: #111; color: #fff; padding: 25px 20px; text-align: center; }
        h1 { margin: 0; font-size: 26px; }
        .branding { margin: 5px 0 0; font-size: 12px; color: #888; text-transform: uppercase; }
        .container { max-width: 900px; margin: 30px auto; padding: 0 15px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .card { background: #fff; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .card img { width: 100%; height: 220px; object-fit: cover; }
        .card-content { padding: 20px; }
        .card-title { font-size: 18px; font-weight: bold; margin: 0 0 8px; }
        .card-desc { font-size: 14px; color: #666; margin: 0 0 15px; line-height: 1.5; }
        .card-price { font-size: 18px; font-weight: bold; margin-bottom: 15px; }
        .order-btn { display: block; text-align: center; background: #25D366; color: white; text-decoration: none; padding: 12px 0; border-radius: 6px; font-weight: bold; }
    </style>
</head>
<body>
    <header>
        <h1>{{ vendor }}</h1>
        <p class="branding">Powered by The Tech Squad</p>
    </header>
    <div class="container">
        <div class="grid">
            {% for item in products %}
            <div class="card">
                <img src="{{ item.image }}" alt="{{ item.name }}">
                <div class="card-content">
                    <div class="card-title">{{ item.name }}</div>
                    <div class="card-desc">{{ item.desc }}</div>
                    <div class="card-price">₦{{ item.price }}</div>
                    <a href="https://wa.me/2340000000000?text=Order: {{ item.name }}" class="order-btn">Order on WhatsApp</a>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
